name: CI

on:
  push:
    branches:
      - main
      - master
      - exp
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    name: Python syntax and tokenizer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m compileall -q tokenizer train.py inference.py benchmarks data engine src

      - name: Test custom BPE tokenizer
        run: >
          python -c "from tokenizer import BytePairTokenizer;
          t=BytePairTokenizer.train('hello hello world', vocab_size=270, progress_every=0);
          ids=t.encode('hello world');
          assert t.decode(ids) == 'hello world';
          print('tokenizer ok:', ids)"

  training-smoke:
    name: Quick training smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run root trainer in quick mode
        run: >
          python train.py
          --quick
          --no-chat
          --data data/input.txt
          --tokenizer data/local/ci_tokenizer.json
          --checkpoint data/local/ci_model.pt

  cpp-engine:
    name: C engine build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build C inference engine
        run: |
          mkdir -p build
          gcc -std=c11 -O2 engine/engine.c -lm -o build/quadtrix_engine

